global:
  image:
    tag: "v2.9.0"

server:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

  config:
    # HIPAA: Disable anonymous access
    users.anonymous.enabled: "false"
    # OIDC integration with AWS SSO
    oidc.config: |
      name: AWS SSO
      issuer: https://portal.sso.us-east-1.amazonaws.com/oidc
      clientID: $oidc-secret:client-id
      clientSecret: $oidc-secret:client-secret
      requestedScopes: ["openid", "profile", "email"]

  rbacConfig:
    policy.default: role:readonly
    policy.csv: |
      p, role:platform-admin, applications, *, */*, allow
      p, role:platform-admin, clusters, get, *, allow
      g, platform-team, role:platform-admin

repoServer:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

applicationSet:
  replicas: 2

redis-ha:
  enabled: true

configs:
  params:
    server.insecure: false
    server.disable.auth: false
